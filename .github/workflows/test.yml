name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Debug dependencies
        run: ls -la && bun --version
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun test
        continue-on-error: false
